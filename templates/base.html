<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brain Tumor Detection</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>



<body>

<!-- ===== VIDEO BACKGROUND ===== -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="{{ url_for('static', filename='videos/15059753_1920_1080_30fps.mp4') }}" type="video/mp4">
</video>

<div class="overlay">

    <!-- NAVBAR -->
    <nav>

        <h2 class="logo">BrainAI</h2>

        <div class="nav-links">

            <!-- MAIN NAV -->
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/detect" class="{% if request.path == '/detect' %}active{% endif %}">Detection</a>
            <a href="/models" class="{% if request.path == '/models' %}active{% endif %}">Models</a>
            <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a>

            <!-- ONLY SHOW WHEN LOGGED IN -->
            {% if session.get('user') %}
                <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a>

                <span class="user-name">
                    {{ session['user'] }}
                </span>

                <a href="/logout" class="logout-btn">Logout</a>

            {% else %}
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}

        </div>

    </nav>

    <!-- PAGE CONTENT -->
    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</div>

<!-- ===== CHATBOT BUTTON ===== -->
<div id="chat-toggle" onclick="toggleChat()">💬</div>

<!-- ===== CHATBOX ===== -->
<div id="chatbox">
    <div class="chat-header">BrainAI Assistant</div>

    <div id="chat-messages"></div>

    <div class="chat-input">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function toggleChat(){
    const box = document.getElementById("chatbox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function sendMessage(){
    const input = document.getElementById("user-input");
    const msg = input.value;

    if(!msg) return;

    addMessage("You", msg);

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        addMessage("Bot", data.reply);
    });

    input.value = "";
}

function addMessage(sender, text){
    const div = document.createElement("div");
    div.innerHTML = `<b>${sender}:</b> ${text}`;
    document.getElementById("chat-messages").appendChild(div);
}
</script>

</body>
</html>
